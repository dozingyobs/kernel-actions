name: Publish Release to APT Repo
on:
  release:
    types: [published]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout apt-repo branch
        uses: actions/checkout@v4
        with:
          ref: apt-repo

      - name: Install APT Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Import GPG Signing Key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format=long | grep sec | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: Generate Lightweight Index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f debs/Packages* debs/Release* debs/InRelease
          rm -rf debs/dl
          mkdir -p debs/dl

          TAG="${{ github.event.release.tag_name }}"
          REPO="${{ github.repository }}"

          curl -sH "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" \
            | jq -r '.assets[] | select(.name | endswith(".deb")) | "\(.name) \(.browser_download_url)"' > download_map.txt

          # Download just to scan metadata; deleted after, never committed
          while read -r filename url; do
            [ -z "$filename" ] && continue
            curl -sL "$url" -o "debs/dl/$filename"
          done < download_map.txt

          cd debs
          dpkg-scanpackages dl /dev/null > Packages

          # Rewrite Filename: using awk, not sed — avoids delimiter/escaping issues with URLs
          while read -r filename url; do
            [ -z "$filename" ] && continue
            awk -v fname="dl/$filename" -v url="$url" '
              $0 == "Filename: " fname { print "Filename: " url; next }
              { print }
            ' Packages > Packages.tmp && mv Packages.tmp Packages
          done < ../download_map.txt

          rm -rf dl
          cd ..
          rm -f download_map.txt

          cd debs
          gzip -k -f Packages
          apt-ftparchive -o APT::FTPArchive::Release::Origin="kernel-actions" \
                         -o APT::FTPArchive::Release::Label="kernel-actions" \
                         -o APT::FTPArchive::Release::Suite="stable" \
                         -o APT::FTPArchive::Release::Codename="kernel-actions" \
                         release . > Release
          cd ..

      - name: Sign the Repository
        run: |
          cd debs
          gpg --batch --yes --default-key "$GPG_KEY_ID" -abs -o Release.gpg Release
          gpg --batch --yes --default-key "$GPG_KEY_ID" --clearsign -o InRelease Release
          cd ..

      - name: Commit and Push to apt-repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add debs/Packages* debs/Release* debs/InRelease
          git commit -m "Publish release ${{ github.event.release.tag_name }}" || exit 0
          git push origin apt-repo
