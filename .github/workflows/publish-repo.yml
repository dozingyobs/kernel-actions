name: Publish Release to APT Repo
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (leave blank for latest)'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install APT Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Import GPG Signing Key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format=long | grep sec | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: Resolve Release Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.event.inputs.tag }}"

          if [ -z "$TAG" ]; then
            TAG=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/latest" \
              | jq -r '.tag_name')
          fi

          echo "Resolved tag: $TAG"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p site/debs/pool
          REPO="${{ github.repository }}"

          echo "Processing assets for release: $RELEASE_TAG"

          curl -sH "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$RELEASE_TAG" \
            | jq -r '.assets[] | select(.name | endswith(".deb")) | "\(.name) \(.browser_download_url)"' > download_map.txt

          while read -r filename url; do
            [ -z "$filename" ] && continue
            echo "Downloading: $filename"
            curl -sL "$url" -o "site/debs/pool/$filename"
          done < download_map.txt
          rm -f download_map.txt
          
      - name: Build Meta-Package
        run: |
          sudo apt-get install -y equivs
          IMAGE_PKG_NAME=$(ls site/debs/pool/linux-image-*.deb | grep -v lazy-meta | head -1 | xargs basename | sed 's/_.*//')
          HEADERS_PKG_NAME=$(ls site/debs/pool/linux-headers-*.deb | head -1 | xargs basename | sed 's/_.*//')

          echo "Resolved image package: $IMAGE_PKG_NAME"
          echo "Resolved headers package: $HEADERS_PKG_NAME"

          cat > lazy-meta.control << EOF
          Package: linux-image-lazy-meta
          Version: ${RELEASE_TAG}
          Architecture: amd64
          Depends: ${IMAGE_PKG_NAME}, ${HEADERS_PKG_NAME}
          Maintainer: dozingyobs
          Description: Meta-package tracking the latest LazyKernel build
           Installing this package ensures apt upgrade always pulls the
           latest LazyKernel image and headers.
          EOF

          equivs-build lazy-meta.control
          mv linux-image-lazy-meta_*.deb site/debs/pool/

      - name: Generate Package Index
        run: |
          cd site/debs
          rm -f Packages Packages.gz Release Release.gpg InRelease
          dpkg-scanpackages pool /dev/null > Packages
          gzip -k -f Packages
          apt-ftparchive -o APT::FTPArchive::Release::Origin="kernel-actions" \
                         -o APT::FTPArchive::Release::Label="kernel-actions" \
                         -o APT::FTPArchive::Release::Suite="stable" \
                         -o APT::FTPArchive::Release::Codename="kernel-actions" \
                         release . > Release
          cd ../..

      - name: Sign the Repository
        run: |
          cd site/debs
          gpg --batch --yes --default-key "$GPG_KEY_ID" -abs -o Release.gpg Release
          gpg --batch --yes --default-key "$GPG_KEY_ID" --clearsign -o InRelease Release
          cd ../..

      - name: Copy public key into site
        run: cp pubkey.gpg site/pubkey.gpg

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
