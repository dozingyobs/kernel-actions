name: Build Kernel
on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Fetch and Verify Kernel Version
      id: get-version
      run: |
        RAW_TEXT=$(curl -sSL --fail "https://www.kernel.org/finger_banner")
        
        if [ -z "$RAW_TEXT" ] || ! echo "$RAW_TEXT" | grep -q "longterm"; then
            echo "Error: Failed to fetch plain text from kernel.org mirror."
            exit 1
        fi
        
        VERSION=$(echo "$RAW_TEXT" | grep -m1 "longterm" | awk '{print $NF}')
        echo "The latest longterm kernel version is: $VERSION"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
    - name: Checkout repository
      uses: actions/checkout@v5
    - name: Free disk space
      run: |
        sudo swapoff -a
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
    - name: Cache the kernel
      id: cache-kernel
      uses: actions/cache@v5
      with:
        path: "linux-${{ steps.get-version.outputs.version }}"
        key: "linux-${{ steps.get-version.outputs.version }}-${{ hashFiles('patches/*.patch') }}"
        restore-keys: |
          linux-${{ steps.get-version.outputs.version }}-
    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ccache-${{ steps.get-version.outputs.version }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ steps.get-version.outputs.version }}-
    - name: Download kernel
      if: steps.cache-kernel.outputs.cache-hit != 'true'
      run: |
        VERSION="${{ steps.get-version.outputs.version }}"
        echo "Cache miss! Downloading version $VERSION..."
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-$VERSION.tar.xz
        tar -xf "linux-$VERSION.tar.xz"
        rm "linux-$VERSION.tar.xz"
    - name: Set up symlink directory
      run: |
        ln -sf "linux-${{ steps.get-version.outputs.version }}" linux
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache clang lld llvm build-essential libncurses-dev bison flex libssl-dev libelf-dev lz4 bc debhelper rsync cpio zstd libdw-dev
        echo "/usr/lib/ccache" >> $GITHUB_PATH
        ccache --set-config=cache_dir=$HOME/.ccache
    - name: Apply patches
      working-directory: linux
      if: steps.cache-kernel.outputs.cache-hit != 'true'
      run: |
        patches=(
          "$GITHUB_WORKSPACE/patches/0001-bore.patch"
          "$GITHUB_WORKSPACE/patches/0002-clear-patches.patch"
          "$GITHUB_WORKSPACE/patches/0003-glitched-base.patch"
        )
        for patch in "${patches[@]}"; do
          patch -p1 < "$patch" || exit 1
        done
    - name: Build Kernel
      working-directory: linux
      run: |
        cp "$GITHUB_WORKSPACE/configs/config" .config
        make LLVM=1 olddefconfig
        ./scripts/config --enable CONFIG_LTO_CLANG_THIN
        ./scripts/config --enable CONFIG_LD_IS_LLD
        ./scripts/config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
        ./scripts/config --file .config -e CONFIG_SCHED_BORE
        ./scripts/config --disable CONFIG_SYSTEM_TRUSTED_KEYRING
        ./scripts/config --disable CONFIG_SYSTEM_REVOCATION_KEYS
        ./scripts/config --disable CONFIG_MODULE_SIG
        ./scripts/config --set-str CONFIG_SYSTEM_TRUSTED_KEYS ""
        ./scripts/config --set-str CONFIG_SYSTEM_REVOCATION_KEYS ""
        ./scripts/config --disable CONFIG_MODULE_SIG_ALL
        ./scripts/config --set-str CONFIG_MODULE_SIG_KEY ""
        ./scripts/config --set-str CONFIG_MODULE_SIG_HASH ""
        ./scripts/config --disable CONFIG_DEBUG_INFO
        ./scripts/config --disable CONFIG_DEBUG_INFO_BTF
        ./scripts/config --disable CONFIG_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
        ./scripts/config --enable CONFIG_DEBUG_INFO_NONE
        ./scripts/config --disable CONFIG_DEBUG_INFO
        ./scripts/config --disable CONFIG_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
        ./scripts/config --disable CONFIG_DEBUG_INFO_DWARF4
        ./scripts/config --disable CONFIG_DEBUG_INFO_DWARF5
        make LLVM=1 olddefconfig
        make LLVM=1 LLVM_IAS=1 CC="ccache clang" KCFLAGS="-march=x86-64-v3 -O2" INSTALL_MOD_STRIP=1 -j$(nproc) bindeb-pkg LOCALVERSION=-lazy KDEB_COMPRESS=zstd 
    - name: Move Build Artifacts for Staging
      run: |
        mkdir -p dist
        echo "Looking for debs:"
        ls -la *.deb 2>/dev/null || echo "No debs found in $(pwd)"
        mv ./*.deb ./dist/ 2>/dev/null || echo "Nothing to move"
        echo "Contents of dist:"
        ls -la dist/
    - name: Create and Upload to Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dist/*.deb"
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        draft: false
        prerelease: false
        tag: ${{ github.ref_name }}
